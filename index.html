<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2AABEE">
<title>Etnogram</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --blue:#2AABEE;
  --bg:#f0f2f5;
  --white:#fff;
  --border:#e8e8e8;
  --text:#000;
  --text2:#707579;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  height:100%;
  width:100%;
  overflow:hidden;
  position:fixed;
}

/* APP LAYOUT FIX */
#app{
  display:none;
  height:100dvh;
  width:100%;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:340px;
  min-width:340px;
  height:100%;
  background:var(--white);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

/* CHAT AREA */
.chat-area{
  flex:1;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}

/* CHAT MAIN FIX */
#chatMain{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  overflow:hidden;
}

/* MESSAGES — IMPORTANT FIX */
.messages{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:4px;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}

/* INPUT FIX (NO DISAPPEAR ON MOBILE) */
.input-bar{
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--white);
  border-top:1px solid var(--border);

  position:sticky;
  bottom:0;
  z-index:50;
}

/* TEXTAREA FIX */
.msg-ta{
  flex:1;
  border:1px solid var(--border);
  border-radius:20px;
  padding:10px 14px;
  font-size:15px;
  resize:none;
  outline:none;
  max-height:140px;
  overflow-y:auto;
  background:var(--bg);
}

/* MESSAGE BUBBLES */
.bw{
  display:flex;
  margin:1px 0;
}

.bw.out{justify-content:flex-end;}
.bw.in{justify-content:flex-start;}

.bubble{
  max-width:75%;
  padding:8px 12px;
  border-radius:16px;
  font-size:14px;
  line-height:1.4;
  word-break:break-word;
}

/* OUT */
.bubble.out{
  background:var(--blue);
  color:#fff;
  border-bottom-right-radius:4px;
}

/* IN */
.bubble.in{
  background:var(--white);
  color:var(--text);
  border-bottom-left-radius:4px;
  box-shadow:0 1px 2px rgba(0,0,0,0.08);
}

/* SENDER */
.b-sender{
  font-size:12px;
  font-weight:600;
  margin-bottom:3px;
  opacity:0.9;
}

/* TIME */
.b-time{
  font-size:10px;
  opacity:0.6;
  text-align:right;
  margin-top:4px;
}

/* EMPTY STATE */
.empty-box{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:var(--text2);
  padding:40px;
}

/* MOBILE FIX */
@media(max-width:700px){
  .sidebar{
    position:fixed;
    inset:0;
    width:100%;
    z-index:10;
  }

  .chat-area{
    position:fixed;
    inset:0;
    z-index:20;
  }

  .bubble{
    max-width:85%;
  }
}
</style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <div class="sidebar-topbar">
      <span class="app-title">Etnogram</span>
      <button class="icon-btn" onclick="openNewChat()">✏️</button>
      <button class="icon-btn" onclick="doLogout()">🚪</button>
    </div>

    <!-- CHATS -->
    <div id="panel-chats" class="panel active">

      <div class="search-wrap">
        <input id="searchQ" placeholder="Поиск..." oninput="renderList()">
      </div>

      <div id="catsRow"></div>

      <div id="chatList"></div>

    </div>

    <!-- CONTACTS -->
    <div id="panel-contacts" class="panel">
      <div class="section-header">Контакты</div>
      <div id="contactsList"></div>
    </div>

    <!-- FRIENDS -->
    <div id="panel-friends" class="panel">
      <div class="section-header">Друзья</div>
      <div id="friendsList"></div>
    </div>

    <!-- SETTINGS -->
    <div id="panel-settings" class="panel">
      <div class="section-header">Настройки</div>
      <div onclick="toggleDark()">🌙 Тёмная тема</div>
      <div onclick="doLogout()">🚪 Выйти</div>
    </div>

    <!-- PROFILE -->
    <div id="panel-profile" class="panel">
      <div class="section-header">Профиль</div>

      <div id="profileAv"></div>
      <div id="profileName"></div>
      <div id="profileUsername"></div>
      <div id="profileMsgCount"></div>

    </div>

  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">

    <!-- EMPTY -->
    <div id="chatEmpty" class="empty-box">
      <div>💬</div>
      <p>Выбери чат</p>
    </div>

    <!-- CHAT MAIN -->
    <div id="chatMain">

      <!-- TOP -->
      <div class="chat-topbar">
        <button onclick="goBack()">←</button>

        <div id="topAv" class="avatar"></div>

        <div>
          <div id="topName"></div>
          <div style="font-size:12px;color:#2AABEE">online</div>
        </div>

        <button onclick="deleteChat()">🗑</button>
      </div>

      <!-- MESSAGES (CRITICAL FIX AREA) -->
      <div id="messages" class="messages"></div>

      <!-- INPUT -->
      <div class="input-bar">
        <textarea
          id="msgTa"
          class="msg-ta"
          placeholder="Сообщение..."
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
          oninput="autoResize(this)">
        </textarea>

        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>

    </div>

  </div>

</div>

<!-- NEW CHAT MODAL -->
<div id="ncModal" class="overlay">
  <div class="modal">
    <h3>Новый чат</h3>

    <input id="ncName" placeholder="Имя">

    <select id="ncCat"></select>

    <button onclick="createChat()">Создать</button>
    <button onclick="closeOverlay('ncModal')">Отмена</button>
  </div>
</div>

<!-- EDIT PROFILE -->
<div id="editModal" class="overlay">
  <div class="modal">
    <h3>Профиль</h3>

    <input id="editName" placeholder="Имя">
    <input id="editUsername" placeholder="@username">

    <button onclick="saveProfile()">Сохранить</button>
    <button onclick="closeOverlay('editModal')">Отмена</button>
  </div>
</div>

</body>
<script>
<script>
const COLORS=[['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fce7f3','#831843'],['#fef3c7','#92400e'],['#ede9fe','#4c1d95'],['#ffedd5','#9a3412'],['#cffafe','#164e63'],['#e0f2fe','#075985']];

let FB='',ME='',USERNAME='',activeCat='all',openId=null,chats={},msgCount=0,darkMode=false,eventSource=null;
let isAdminMode=false;

const ADMIN_TOKENS=["admin_12345_secure"];
const TOKEN_KEY='et_token_secure';

let lastMsgId=null;
let renderQueued=false;

const $=id=>document.getElementById(id);
const show=id=>$(id)&&( $(id).style.display='flex');
const hide=id=>$(id)&&( $(id).style.display='none');

function escapeHTML(str){
  return (str||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function initials(n){
  return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function avStyle(idx){
  const [bg,fg]=COLORS[(idx||0)%COLORS.length];
  return `background:${bg};color:${fg}`;
}

function fmt(ts){
  const d=new Date(ts||Date.now()),n=new Date();
  return d.toDateString()===n.toDateString()
    ? d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})
    : d.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
}

function isAtBottom(el){
  return el.scrollHeight - el.scrollTop - el.clientHeight < 80;
}

function scheduleRender(){
  if(renderQueued) return;
  renderQueued=true;

  requestAnimationFrame(()=>{
    renderCats();
    renderList();
    renderContacts();
    renderFriends();
    renderQueued=false;
  });
}

function autoResize(el){
  el.style.height='42px';
  el.style.height=Math.min(el.scrollHeight,150)+'px';
}

/* ================= TOKEN ================= */

function checkToken(){
  const t=$('tokenInput').value.trim();
  $('tokenError').textContent='';

  if(!t){
    $('tokenError').textContent='Введите токен';
    return;
  }

  if(ADMIN_TOKENS.includes(t)){
    sessionStorage.setItem('admin_token',t);
    isAdminMode=true;
    FB=localStorage.getItem('et_fb')||'';

    $('tokenScreen').style.display='none';

    if(FB){
      show('adminPanel');
      loadAdminData();
    }else{
      show('setupScreen');
    }
    return;
  }

  sessionStorage.setItem(TOKEN_KEY,t);
  isAdminMode=false;

  FB=localStorage.getItem('et_fb')||'';
  ME=localStorage.getItem('et_me')||'';
  USERNAME=localStorage.getItem('et_un')||'';

  $('tokenScreen').style.display='none';

  if(FB&&ME){
    show('loadScreen');
    startApp();
  }else{
    show('setupScreen');
  }
}

/* ================= FIREBASE ================= */

async function fb(path,method='GET',data){
  const token=isAdminMode
    ? sessionStorage.getItem('admin_token')
    : sessionStorage.getItem(TOKEN_KEY);

  const url=`${FB}${path}.json?auth=${encodeURIComponent(token)}`;

  const r=await fetch(url,{
    method,
    headers:{'Content-Type':'application/json'},
    body:data?JSON.stringify(data):undefined
  });

  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

/* ================= APP ================= */

async function startApp(){
  try{
    const d=await fb('/chats');
    chats=d||{};

    hide('loadScreen');
    $('app').style.display='flex';

    initThemeAndSettings();
    updateProfile();

    scheduleRender();
    startRealtime();

  }catch(e){
    alert('Ошибка подключения');
    location.reload();
  }
}

/* ================= REALTIME ================= */

function startRealtime(){
  if(eventSource) eventSource.close();

  const url=`${FB}/chats.json?auth=${encodeURIComponent(sessionStorage.getItem(TOKEN_KEY))}`;
  eventSource=new EventSource(url);

  eventSource.onmessage=(e)=>{};

  eventSource.addEventListener('put',(e)=>{
    const data=JSON.parse(e.data);

    if(data.path==='/'){
      chats=data.data||{};
    }else{
      const p=data.path.split('/').filter(Boolean);
      let cur=chats;

      for(let i=0;i<p.length-1;i++){
        cur=cur[p[i]]||(cur[p[i]]={});
      }

      const k=p[p.length-1];
      data.data===null ? delete cur[k] : cur[k]=data.data;
    }

    scheduleRender();

    if(openId && chats[openId]){
      renderMsgs();
    }
  });
}

/* ================= CHAT LIST ================= */

function getCats(){
  const s=new Set();
  Object.values(chats).forEach(c=>c?.cat&&s.add(c.cat));
  return ['all',...s];
}

function renderCats(){
  $('catsRow').innerHTML=getCats().map(c=>
    `<div class="cat-pill ${activeCat===c?'active':''}"
      onclick="setCat('${escapeHTML(c)}')">
      ${c==='all'?'Все':escapeHTML(c)}
    </div>`
  ).join('');
}

function setCat(c){
  activeCat=c;
  scheduleRender();
}

function renderList(){
  let items=Object.entries(chats).filter(([,c])=>c);

  const q=$('searchQ')?.value?.toLowerCase()||'';

  if(activeCat!=='all') items=items.filter(([,c])=>c.cat===activeCat);
  if(q) items=items.filter(([,c])=>c.name?.toLowerCase().includes(q));

  const el=$('chatList');

  if(!items.length){
    el.innerHTML='<div class="empty-box">Нет чатов</div>';
    return;
  }

  el.innerHTML=items.map(([id,c])=>{
    const msgs=c.messages?Object.values(c.messages).sort((a,b)=>a.ts-b.ts):[];
    const lm=msgs[msgs.length-1];

    const pre=lm
      ? (lm.sender===ME?'Вы: ':'')+lm.text
      : 'Нет сообщений';

    return `
      <div class="chat-item ${openId===id?'sel':''}"
        onclick="openChat('${id}')">

        <div class="avatar" style="${avStyle(c.colorIdx)}">
          ${initials(c.name)}
        </div>

        <div class="chat-meta">
          <div class="cm-row1">
            <span class="cm-name">${escapeHTML(c.name)}</span>
            <span class="cm-time">${lm?fmt(lm.ts):''}</span>
          </div>

          <div class="cm-row2">
            <span class="cm-preview">${escapeHTML(pre)}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

/* ================= CHAT ================= */

function openChat(id){
  openId=id;
  lastMsgId=null;

  const c=chats[id];

  $('chatEmpty').style.display='none';
  $('chatMain').style.display='flex';

  $('topName').innerText=c.name;
  $('topAv').innerText=initials(c.name);
  $('topAv').style.cssText=avStyle(c.colorIdx);

  renderMsgs();
}

function renderMsgHTML(m){
  const io=m.sender===ME;

  return `
  <div class="bw ${io?'out':'in'}">
    <div class="bubble ${io?'out':'in'}">
      ${!io?`<div class="b-sender">${escapeHTML(m.sender)}</div>`:''}
      ${escapeHTML(m.text)}
      <div class="b-time">${fmt(m.ts)}</div>
    </div>
  </div>`;
}

function renderMsgs(){
  if(!openId||!chats[openId]) return;

  const el=$('messages');
  const c=chats[openId];

  const msgs=c.messages
    ? Object.values(c.messages).sort((a,b)=>a.ts-b.ts)
    : [];

  if(!msgs.length){
    el.innerHTML='Нет сообщений';
    return;
  }

  if(!lastMsgId){
    el.innerHTML=msgs.map(renderMsgHTML).join('');
    lastMsgId=msgs[msgs.length-1].id;
    el.scrollTop=el.scrollHeight;
    return;
  }

  const newMsgs=msgs.filter(m=>m.id>lastMsgId);
  if(!newMsgs.length) return;

  const stick=isAtBottom(el);

  newMsgs.forEach(m=>{
    const d=document.createElement('div');
    d.innerHTML=renderMsgHTML(m);
    el.appendChild(d.firstElementChild);
  });

  lastMsgId=msgs[msgs.length-1].id;

  if(stick) el.scrollTop=el.scrollHeight;
}

/* ================= SEND ================= */

async function sendMsg(){
  const ta=$('msgTa');
  const t=ta.value.trim();
  if(!t||!openId) return;

  ta.value='';

  const id='msg_'+Date.now();

  const m={
    id,
    sender:ME,
    text:t,
    ts:Date.now()
  };

  await fb(`/chats/${openId}/messages/${id}`,'PUT',m);
}

/* ================= PROFILE ================= */

function updateProfile(){
  $('profileName').innerText=ME;
  $('profileUsername').innerText=USERNAME;
}

/* ================= INIT ================= */

window.onload=()=>{
  const t=sessionStorage.getItem(TOKEN_KEY);
  if(t){
    FB=localStorage.getItem('et_fb')||'';
    ME=localStorage.getItem('et_me')||'';
    USERNAME=localStorage.getItem('et_un')||'';

    if(FB&&ME){
      show('loadScreen');
      startApp();
    }else{
      show('setupScreen');
    }
  }else{
    show('tokenScreen');
  }
};
</script>
</script>
</body>
</html>
